version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      artifact:
        patterns:
          - "*-artifact"
    cooldown:
      default-days: 3
      include:
        - "*"
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
      include:
        - "*"
