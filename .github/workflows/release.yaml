name: Release
on:
  push:
    tags:
      - "v*.*.*"
    # also test workflow when changed:
    branches:
      - "*"
    paths:
      - ".github/workflows/release.yaml"
      - "requirements_exe.txt"
  workflow_dispatch:
    inputs:
      test_pypi:
        description: Publish to test pypi (can only be done once per version)
        type: boolean

permissions:
  contents: read

jobs:
  ci:  # make sure CI passes before releasing
    if: startsWith(github.ref, 'refs/tags/')  # only create release on tag pushes
    uses: ./.github/workflows/ci.yaml


  build-exe:
    name: Build EXE for ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-22.04, macos-latest]
        include:
          - os: windows-latest
            py: "3.13"
            name: "win64"
          - os: ubuntu-22.04
            py: "3.13"
            name: "ubuntu-amd64"
          - os: macos-latest
            py: "3.13"
            name: "macos"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Set env (tag)
        if: startsWith(github.ref, 'refs/tags/')  # version in filename for releases
        shell: bash
        run: |
          RELEASE_VERSION="${GITHUB_REF#refs/*/v}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "RELEASE_NAME=${RELEASE_VERSION//./}" >> $GITHUB_ENV
      - name: Set env (dev)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}  # "dev" in filename for non-releases
        shell: bash
        run: |
          echo "RELEASE_NAME=dev" >> $GITHUB_ENV
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install python ${{ matrix.py }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.py }}
      - name: Build exe
        shell: bash
        run: |
          python -m pip install -U pip
          python -m pip install -U -r requirements.txt -r requirements_exe.txt
          python -m PyInstaller -F pack_checker.py
          cp README* dist/
          mkdir rls
      - name: ZIP
        if: ${{ runner.os == 'Windows' }}
        shell: bash
        run: |
          cd dist
          7z a -mx=9 "../rls/pack-checker_${{ env.RELEASE_NAME }}_${{ matrix.name }}.zip" -- *
      - name: TAR GZ
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          cd dist
          tar -czvf "../rls/pack-checker_${{ env.RELEASE_NAME }}_${{ matrix.name }}.tar.gz" -- *
      - name: Store Build
        uses: actions/upload-artifact@v7
        with:
          path: "rls/*"
          archive: false
          retention-days: 1
      - name: Checkout PopTracker examples
        uses: actions/checkout@v6
        with:
          repository: black-sliver/PopTracker
          path: PopTracker
          sparse-checkout: |
            examples
      - name: Test EXE
        shell: bash
        run: |
          cd dist
          ./pack_checker* --help
          ./pack_checker* -b ../PopTracker/examples/luminosity-test

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/')  # only create release on tag pushes
    needs:
      - ci  # NOTE: publish waits for release, so we only need to wait for ci here
      - build-exe
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: required for create release

    steps:
      - name: Set env (tag)
        if: startsWith(github.ref, 'refs/tags/')  # version name based on tag
        shell: bash
        run: |
          RELEASE_VERSION="${GITHUB_REF#refs/*/v}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
      - name: Download all the EXEs
        uses: actions/download-artifact@v8
        with:
          pattern: "pack-checker_*"
          path: rls/
          skip-decompress: true  # they should not have been compressed by upload-artifact
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')  # only create release on tag pushes
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          draft: true
          name: pack-checker v${{ env.RELEASE_VERSION }}
          files: |
            ./rls/**
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pypa/build
        run: >-
          python3 -m
          pip install
          build
          --user
      - name: Build a binary wheel and a source tarball
        run: python3 -m build
      - name: Store the distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/


  publish_pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
      - build
      - release  # run after we successfully created the release since this can't be undone
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/p/pack-checker

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1


  publish_testpypi:
    name: Publish to TestPyPI
    needs:
      - build
      - release  # run after we successfully created the release since this can't be undone
      - build-exe  # release may be skipped, so wait for successful upload artifact
    if: |
      always()
      && inputs.test_pypi
      && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/pack-checker

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
